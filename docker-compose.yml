services:
  dev:
    build: .
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./config.example.yaml:/app/config.example.yaml
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0

  staging:
    build: .
    ports:
      - "8502:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0

  api:
    build: .
    command: uv run uvicorn api_main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./api_main.py:/app/api_main.py
      - ./src:/app/src
    environment:
      - DUTY_API_AUTH_ENABLED=false
      - DUTY_API_KEYS=
      - DUTY_API_RATE_LIMIT=60/minute
