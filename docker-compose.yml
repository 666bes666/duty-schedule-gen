services:
  dev:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./examples:/app/examples
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0

  staging:
    build: .
    ports:
      - "8502:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
