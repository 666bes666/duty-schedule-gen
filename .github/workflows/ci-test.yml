name: CI Test (Thorough)

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/

  test-matrix:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python }}
      - run: uv run pytest tests/unit tests/integration tests/contract -q --cov=duty_schedule --cov-report=xml --cov-fail-under=80
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          extra-groups: ci-security
      - run: uv run pip-audit
      - run: uv run bandit -r src/ -c pyproject.toml

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          extra-groups: ci-perf
      - run: uv run pytest tests/performance -q --benchmark-only

  streamlit-smoke:
    name: Streamlit Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Streamlit healthcheck
        run: |
          uv run streamlit run app.py \
            --server.headless true \
            --server.port 8501 \
            --server.enableCORS false \
            --browser.gatherUsageStats false &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health > /dev/null 2>&1; then
              echo "Streamlit is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8501/_stcore/health
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8501)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ]
          kill %1 || true
