name: CI Test (Thorough)

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/

  test-matrix:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python }}
      - run: uv run pytest tests/unit tests/integration tests/contract -q --cov=duty_schedule --cov-report=xml --cov-fail-under=80
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          extra-groups: ci-security
      - run: uv run pip-audit
      - run: uv run bandit -r src/ -c pyproject.toml

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          extra-groups: ci-perf
      - name: Restore benchmark baseline
        id: bench-cache
        uses: actions/cache/restore@v4
        with:
          path: .benchmarks/
          key: benchmark-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            benchmark-${{ runner.os }}-
      - name: Run benchmarks
        run: |
          EXTRA="--benchmark-save=baseline"
          if [ "${{ steps.bench-cache.outputs.cache-hit }}" = "true" ] && \
             ls .benchmarks/Linux/*.json 2>/dev/null | head -1 > /dev/null 2>&1; then
            PREV=$(ls .benchmarks/Linux/*.json | head -1 | xargs basename | sed 's/\.json$//')
            EXTRA="--benchmark-save=baseline --benchmark-compare=$PREV --benchmark-compare-fail=mean:110%"
          fi
          uv run pytest tests/performance -q --benchmark-only $EXTRA
      - name: Save benchmark baseline
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .benchmarks/
          key: benchmark-${{ runner.os }}-${{ github.sha }}

  streamlit-smoke:
    name: Streamlit Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Streamlit healthcheck
        uses: ./.github/actions/streamlit-smoke
