name: CI Dev (Fast Gate)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - run: uv run pytest tests/unit tests/integration -q --cov=duty_schedule --cov-report=xml --cov-fail-under=80

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
        with:
          extra-groups: ci-security
      - run: uv run pip-audit

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: CLI --help
        run: uv run duty-schedule --help
      - name: Validate example config
        run: uv run duty-schedule validate config.example.yaml
      - name: Streamlit healthcheck
        uses: ./.github/actions/streamlit-smoke
