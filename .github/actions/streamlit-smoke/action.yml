name: Streamlit Smoke Check
description: Start Streamlit, wait for health (up to 60s), verify HTTP 200

inputs:
  port:
    description: Port to run Streamlit on
    default: "8501"
  keep-running:
    description: Keep Streamlit running after health check (for UI tests)
    default: "false"

runs:
  using: composite
  steps:
    - name: Start Streamlit
      shell: bash
      run: |
        uv run streamlit run app.py \
          --server.headless true \
          --server.port ${{ inputs.port }} \
          --server.enableCORS false \
          --browser.gatherUsageStats false &
        echo $! > /tmp/streamlit.pid

    - name: Wait for Streamlit to be healthy
      shell: bash
      run: |
        for i in $(seq 1 60); do
          if curl -sf http://localhost:${{ inputs.port }}/_stcore/health > /dev/null 2>&1; then
            echo "Streamlit healthy after ${i}s"
            break
          fi
          if [ "$i" = "60" ]; then
            echo "Streamlit failed to start within 60s"
            exit 1
          fi
          sleep 1
        done

    - name: Verify HTTP 200
      shell: bash
      run: |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ inputs.port }})
        echo "HTTP status: $STATUS"
        [ "$STATUS" = "200" ]

    - name: Stop Streamlit
      if: inputs.keep-running == 'false'
      shell: bash
      run: kill $(cat /tmp/streamlit.pid) 2>/dev/null || true
