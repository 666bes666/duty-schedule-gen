name: Setup Python with uv
description: Install Python via uv, sync dependencies

inputs:
  python-version:
    description: Python version to install
    default: "3.12"
  dev-deps:
    description: Install dev dependencies
    default: "true"
  extra-groups:
    description: Additional dependency groups (comma-separated)
    default: ""

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v3
    - run: uv python install ${{ inputs.python-version }}
      shell: bash
    - run: |
        ARGS=""
        if [ "${{ inputs.dev-deps }}" = "true" ]; then
          ARGS="--dev"
        fi
        if [ -n "${{ inputs.extra-groups }}" ]; then
          IFS=',' read -ra DEP_GROUPS <<< "${{ inputs.extra-groups }}"
          for g in "${DEP_GROUPS[@]}"; do
            g=$(echo "$g" | xargs)
            if [ -n "$g" ]; then
              ARGS="$ARGS --group $g"
            fi
          done
        fi
        uv sync $ARGS
      shell: bash
